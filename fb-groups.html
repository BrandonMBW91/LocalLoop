<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Local Loop - FB Group Tracker</title>
<style>
  :root { --bg:#FBF8F1; --card:#fff; --ink:#1A1A1A; --muted:#5B5B5B; --line:#E4DED4;
          --navy:#15315B; --red:#B22234; --green:#256B29; --amber:#9A6B00; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#0F1729; --card:#182238; --ink:#E8ECF4; --muted:#98A4BA; --line:#2A3650;
            --navy:#5B8AD1; --red:#E06A73; --green:#5BC98A; --amber:#D8C06A; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; line-height:1.45; }
  .wrap { max-width:860px; margin:0 auto; padding:16px; }
  h1 { font-size:22px; margin:6px 0 2px; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:12px; }
  .bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }
  input[type=search] { flex:1; min-width:180px; padding:10px 12px; border:1.5px solid var(--line);
         border-radius:10px; background:var(--card); color:var(--ink); font-size:15px; }
  .fbtn { padding:8px 14px; border:1.5px solid var(--line); border-radius:999px; background:var(--card);
          color:var(--ink); font-size:14px; cursor:pointer; }
  .fbtn.on { border-color:var(--navy); color:var(--navy); font-weight:700; }
  .counts { font-size:13px; color:var(--muted); margin-bottom:10px; }
  .g { background:var(--card); border:1.5px solid var(--line); border-radius:14px; padding:12px 14px; margin-bottom:10px; }
  .g.removed { border-left:6px solid var(--red); }
  .g.posted { border-left:6px solid var(--green); }
  .g.new { border-left:6px solid var(--amber); }
  .g.pending { border-left:6px solid var(--navy); }
  .g.skipped { border-left:6px solid var(--line); opacity:.75; }
  .top { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .name { font-weight:700; font-size:16px; flex:1; min-width:200px; }
  .area { font-size:12px; color:var(--muted); background:var(--bg); border:1px solid var(--line);
          border-radius:999px; padding:2px 10px; white-space:nowrap; }
  select { padding:7px 10px; border:1.5px solid var(--line); border-radius:9px; background:var(--card);
           color:var(--ink); font-size:14px; }
  label { display:block; font-size:12px; font-weight:700; color:var(--muted); margin:10px 0 3px;
          text-transform:uppercase; letter-spacing:.5px; }
  textarea, input[type=text] { width:100%; padding:9px 11px; border:1.5px solid var(--line);
          border-radius:9px; background:var(--bg); color:var(--ink); font-size:14px; font-family:inherit; }
  textarea { min-height:44px; resize:vertical; }
  .why { display:none; }
  .g[data-status="removed"] .why { display:block; }
  .g[data-status="removed"] .why input { border-color:var(--red); }
  .foot { margin:18px 0; display:flex; gap:8px; flex-wrap:wrap; }
  .foot button { padding:10px 16px; border-radius:999px; border:1.5px solid var(--navy);
          background:var(--navy); color:#fff; font-size:14px; font-weight:700; cursor:pointer; }
  .foot button.ghost { background:transparent; color:var(--navy); }
  .saved { font-size:12px; color:var(--green); align-self:center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>FB Group Tracker</h1>
  <div class="sub">Everything saves automatically on this computer. Mark a group Removed and write why so the next posting round adapts.</div>

  <div class="bar">
    <input type="search" id="q" placeholder="Search groups or towns...">
    <button class="fbtn on" data-f="all">All</button>
    <button class="fbtn" data-f="new">To post</button>
    <button class="fbtn" data-f="pending">Pending</button>
    <button class="fbtn" data-f="posted">Posted OK</button>
    <button class="fbtn" data-f="removed">Removed</button>
  </div>
  <div class="counts" id="counts"></div>
  <div id="list"></div>

  <div class="foot">
    <button id="add" class="ghost">+ Add group</button>
    <button id="link">Auto-save to file</button>
    <button id="exp" class="ghost">Download backup</button>
    <button id="imp" class="ghost">Restore backup</button>
    <input type="file" id="impfile" accept=".json" style="display:none">
    <span class="saved" id="savemsg"></span>
  </div>
  <div class="sub" id="linkstatus" style="margin-top:-8px;"></div>
</div>

const KEY = 'll-fb-groups-v3';
let data = load();
function load() {
  let saved = [];
  try { saved = JSON.parse(localStorage.getItem(KEY)) || []; } catch { saved = []; }
  const byName = Object.fromEntries(saved.map((g) => [g.name, g]));
  // Seed any groups not yet saved; saved edits always win.
  for (const [name, area, status, rules, notes] of SEED) {
    if (!byName[name]) saved.push({ name, area, status, rules, why: '', notes: notes || '' });
  }
  return saved;
}
function save(msg) {
  localStorage.setItem(KEY, JSON.stringify(data)); // primary: instant, browser
  const m = document.getElementById('savemsg');
  m.textContent = msg || 'Saved';
  clearTimeout(save.t); save.t = setTimeout(() => (m.textContent = ''), 1500);
  clearTimeout(save.ft); save.ft = setTimeout(writeFile, 400); // mirror to the linked file
}

// ---- optional auto-save to a real file (Chrome/Edge; File System Access API) ----
const FS_OK = 'showSaveFilePicker' in window;
let fileHandle = null;
const setLinkStatus = (t) => { document.getElementById('linkstatus').textContent = t; };
const idb = () => new Promise((res, rej) => { const r = indexedDB.open('ll-fbg', 1);
  r.onupgradeneeded = () => r.result.createObjectStore('kv'); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); });
async function idbSet(k, v) { const db = await idb(); return new Promise((res) => { const t = db.transaction('kv', 'readwrite'); t.objectStore('kv').put(v, k); t.oncomplete = res; }); }
async function idbGet(k) { const db = await idb(); return new Promise((res) => { const rq = db.transaction('kv', 'readonly').objectStore('kv').get(k); rq.onsuccess = () => res(rq.result); rq.onerror = () => res(null); }); }

async function writeFile() {
  if (!fileHandle) return;
  try {
    const w = await fileHandle.createWritable();
    await w.write(JSON.stringify(data, null, 2));
    await w.close();
    setLinkStatus('Auto-saving to your file. Nothing can be lost.');
  } catch { fileHandle = null; setLinkStatus('File save stopped. Click Auto-save to file to relink.'); }
}
async function ensureLink() {
  if (!FS_OK) return;
  const h = await idbGet('handle');
  if (h && (await h.queryPermission({ mode: 'readwrite' })) !== 'granted') {
    if ((await h.requestPermission({ mode: 'readwrite' })) === 'granted') { fileHandle = h; await writeFile(); return; }
  }
  try {
    fileHandle = await window.showSaveFilePicker({ suggestedName: 'fb-groups.json',
      types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }] });
    await idbSet('handle', fileHandle); await writeFile();
  } catch { /* user cancelled the picker */ }
}
async function restoreLink() {
  if (!FS_OK) { document.getElementById('link').style.display = 'none';
    setLinkStatus('Auto-file needs Chrome or Edge. Your work still saves in this browser; use Download backup to keep a copy.'); return; }
  const h = await idbGet('handle');
  if (h && (await h.queryPermission({ mode: 'readwrite' })) === 'granted') { fileHandle = h; setLinkStatus('Auto-saving to your file. Nothing can be lost.'); }
  else if (h) setLinkStatus('You linked a save file before. Click Auto-save to file to reconnect it.');
  else setLinkStatus('Tip: click Auto-save to file once to keep a permanent copy that survives anything.');
}

let filter = 'all', query = '';
const STATUS_LABEL = { posted: 'Posted OK', new: 'Not posted yet', pending: 'Pending admin approval', removed: 'REMOVED', skipped: 'Skipped' };

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';
  const q = query.toLowerCase();
  let shown = 0;
  data.forEach((g, i) => {
    if (filter !== 'all' && g.status !== filter) return;
    if (q && !(g.name + ' ' + g.area).toLowerCase().includes(q)) return;
    shown++;
    const el = document.createElement('div');
    el.className = 'g ' + g.status;
    el.dataset.status = g.status;
    el.innerHTML = `
      <div class="top">
        <div class="name"></div>
        <span class="area"></span>
        <select>
          <option value="new">Not posted yet</option>
          <option value="pending">Pending admin approval</option>
          <option value="posted">Posted OK</option>
          <option value="removed">Removed / deleted</option>
          <option value="skipped">Skipped</option>
        </select>
      </div>
      <label>Group rules</label>
      <textarea placeholder="Paste or summarize the group's rules here..."></textarea>
      <div class="why">
        <label>Why was the post removed?</label>
        <input type="text" placeholder="e.g. admin said no business posts, flagged as spam, no reason given...">
      </div>
      <label>Notes</label>
      <input type="text" class="notes" placeholder="Anything else (best angle, posting day, admin name...)">`;
    el.querySelector('.name').textContent = g.name;
    el.querySelector('.area').textContent = g.area;
    const sel = el.querySelector('select'); sel.value = g.status;
    const rules = el.querySelector('textarea'); rules.value = g.rules || '';
    const why = el.querySelector('.why input'); why.value = g.why || '';
    const notes = el.querySelector('.notes'); notes.value = g.notes || '';
    sel.onchange = () => { g.status = sel.value; save(); render(); };
    rules.oninput = () => { g.rules = rules.value; save(); };
    why.oninput = () => { g.why = why.value; save(); };
    notes.oninput = () => { g.notes = notes.value; save(); };
    list.appendChild(el);
  });
  const c = (s) => data.filter((g) => g.status === s).length;
  document.getElementById('counts').textContent =
    `${shown} shown · ${c('new')} to post · ${c('pending')} pending · ${c('posted')} posted OK · ${c('removed')} removed · ${c('skipped')} skipped · ${data.length} total`;
}

document.getElementById('q').oninput = (e) => { query = e.target.value; render(); };
document.querySelectorAll('.fbtn').forEach((b) => {
  b.onclick = () => {
    document.querySelectorAll('.fbtn').forEach((x) => x.classList.remove('on'));
    b.classList.add('on'); filter = b.dataset.f; render();
  };
});
document.getElementById('add').onclick = () => {
  const name = prompt('Group name?'); if (!name) return;
  const area = prompt('Town / area?') || '';
  data.unshift({ name, area, status: 'new', rules: '', why: '', notes: '' });
  save(); render();
};
document.getElementById('exp').onclick = () => {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
  a.download = 'fb-groups-backup.json'; a.click();
};
document.getElementById('link').onclick = ensureLink;
document.getElementById('imp').onclick = () => document.getElementById('impfile').click();
document.getElementById('impfile').onchange = (e) => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => { try { data = JSON.parse(r.result); save('Restored'); render(); } catch { alert('Not a valid backup file.'); } };
  r.readAsText(f);
};
render();
restoreLink();
</script>

</html>
