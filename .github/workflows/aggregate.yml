name: Aggregate events

# Pulls events from your calendar feeds into Supabase, daily.
on:
  schedule:
    # 06:17 UTC = ~2:17am ET. Off the congested top-of-hour so GitHub's 2-3h
    # cron delay still lands it BEFORE the 7am local Eventbrite refresh (the
    # old '0 9' drifted to 7-8am ET and raced the local run — Jul 2026 audit).
    - cron: '17 6 * * *'
  workflow_dispatch: {} # also lets you run it manually from the Actions tab

jobs:
  aggregate:
    runs-on: ubuntu-latest
    # Ship the self-serve public surfaces: per-event SEO pages, the sponsor portal
    # (manage-ad.html), the embed widget + partners page, and the $9 Local Deal card on
    # advertise.html. Job-level so BOTH the generate-events and generate-advertise steps
    # see it. Kept until we ever need to pull these back.
    env:
      SEO_ITEM_PAGES: '1'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        working-directory: aggregator
        # --omit=optional: xlsx (desktop-only roster mining, unused by this job)
        # comes from cdn.sheetjs.com, which intermittently 403s CI runners and
        # killed the whole nightly at `npm ci` (first hit 2026-07-14). Optional +
        # omitted = that CDN can never take the nightly down.
        run: npm ci --omit=optional
      - name: Validate city config (hard gate)
        working-directory: aggregator
        run: node check-cities.mjs
      - name: Run aggregator
        working-directory: aggregator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node aggregate.mjs
      - name: Pull Ticketmaster events (concerts/theater/sports)
        working-directory: aggregator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: node ticketmaster.mjs
      - name: Pull SeatGeek events (deduped vs Ticketmaster)
        working-directory: aggregator
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
        run: node seatgeek.mjs
      - name: De-duplicate across sources
        working-directory: aggregator
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node dedupe.mjs --apply
      # Food trucks moved to the DESKTOP (aggregator/local-refresh.cmd, 7:00 AM).
      # StreetFoodFinder is behind Cloudflare, which serves this runner's
      # datacenter IP a challenge page with no vtok — the pull failed every night
      # from 2026-07-14 and logged a false feed error, while the same code from a
      # residential IP returns 32 stops. The follower push moved with it so the
      # notification still fires right after the stops land (and at 7 AM, not
      # 4:36 AM). Same reason Eventbrite already lives there.
      - name: Retention (drop aggregator events older than 60 days)
        working-directory: aggregator
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node retention.mjs
      - name: Geocode new events (map pins)
        working-directory: aggregator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: node geocode.mjs
      - name: Assign true city boundaries (Census polygons)
        working-directory: aggregator
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node assign-boundaries.mjs
      - name: All-Region ad backfill (new towns join paid region subs)
        working-directory: aggregator
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node backfill-region-ads.mjs
      - name: Feed health (dead-source report)
        working-directory: aggregator
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node feed-health.mjs
      - name: Regenerate SEO event pages
        working-directory: aggregator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node generate-events.mjs
      - name: Regenerate advertise page (live per-town pricing)
        working-directory: aggregator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node generate-advertise.mjs
      - name: Content guard — flag any ghost/thin town (does not block deploy)
        working-directory: aggregator
        # Non-blocking: the app picker + SEO pages already hide empty towns, and the
        # daily run fills them in. This step just surfaces a red X in the log if a
        # NEW town aggregated to 0 events (likely a mis-wired feed worth a look).
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node check-content.mjs --strict --allow=larue,prospect,green-camp
      # localloop.io IS the usable Expo web app, NOT the static marketing site.
      # This job used to deploy --dir=site (marketing) nightly, which silently
      # REVERTED every manual web-app deploy the next morning (2026-07-14: the
      # site served a "Download on the App Store" page with no app bundle, and
      # Android users — who have no native app — hit a dead end). The fix: build
      # the web app here and deploy dist. build-web.mjs runs `expo export` for the
      # app shell, merges the marketing/legal/SEO files this job just regenerated
      # in site/, and regenerates the per-event SEO pages from live data — so the
      # app AND the SEO stay fresh in one deploy. See scripts/build-web.mjs.
      - name: Install web app deps (for the Expo web build)
        run: npm ci
      - name: Build the web app (app shell + merged site/ + fresh SEO)
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: npm run build:web
      - name: Deploy web app to Netlify (localloop.io)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        # Guard: only publish if the build produced a real app shell (bundle ref +
        # the bundle file). A broken build must NOT ship an empty/marketing dist —
        # Netlify keeps serving the last good deploy until the build is fixed.
        # --no-build is REQUIRED so the CLI ships dist as-is instead of re-running
        # the Netlify UI's stale "expo export -p web" build command.
        run: |
          BUNDLE=$(grep -oE "/_expo/static/js/web/[^\"']+\.js" dist/index.html | head -1)
          if [ -z "$BUNDLE" ] || [ ! -f "dist$BUNDLE" ]; then
            echo "::error::web build produced no app bundle (dist is not the web app) — refusing to deploy; last good deploy stays live"
            exit 1
          fi
          npx --yes netlify-cli deploy --prod --no-build --dir=dist --site "$NETLIFY_SITE_ID" --message "aggregate ${{ github.run_id }} (web app)"
