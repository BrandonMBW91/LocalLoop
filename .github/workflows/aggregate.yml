name: Aggregate events

# Pulls events from your calendar feeds into Supabase, daily.
on:
  schedule:
    # 06:17 UTC = ~2:17am ET. Off the congested top-of-hour so GitHub's 2-3h
    # cron delay still lands it BEFORE the 7am local Eventbrite refresh (the
    # old '0 9' drifted to 7-8am ET and raced the local run — Jul 2026 audit).
    - cron: '17 6 * * *'
  workflow_dispatch: {} # also lets you run it manually from the Actions tab

jobs:
  aggregate:
    runs-on: ubuntu-latest
    # Ship the self-serve public surfaces: per-event SEO pages, the sponsor portal
    # (manage-ad.html), the embed widget + partners page, and the $9 Local Deal card on
    # advertise.html. Job-level so BOTH the generate-events and generate-advertise steps
    # see it. Kept until we ever need to pull these back.
    env:
      SEO_ITEM_PAGES: '1'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        working-directory: aggregator
        run: npm ci
      - name: Validate city config (hard gate)
        working-directory: aggregator
        run: node check-cities.mjs
      - name: Run aggregator
        working-directory: aggregator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node aggregate.mjs
      - name: Pull Ticketmaster events (concerts/theater/sports)
        working-directory: aggregator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: node ticketmaster.mjs
      - name: Pull SeatGeek events (deduped vs Ticketmaster)
        working-directory: aggregator
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
        run: node seatgeek.mjs
      - name: De-duplicate across sources
        working-directory: aggregator
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node dedupe.mjs --apply
      - name: Food-truck calendars (auto-ingest stops from registered calendars)
        working-directory: aggregator
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node truck-calendars.mjs
      - name: Notify truck followers (DRY RUN — logs only until device-verified)
        working-directory: aggregator
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        # No --send: prints who it WOULD push so we can confirm the match logic on
        # real data before enabling delivery. Flip to `... --send` after verifying a
        # push arrives on a device (follow a truck, post a new stop for it).
        run: node notify-truck-followers.mjs
      - name: Retention (drop aggregator events older than 60 days)
        working-directory: aggregator
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node retention.mjs
      - name: Geocode new events (map pins)
        working-directory: aggregator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: node geocode.mjs
      - name: Assign true city boundaries (Census polygons)
        working-directory: aggregator
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node assign-boundaries.mjs
      - name: All-Region ad backfill (new towns join paid region subs)
        working-directory: aggregator
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node backfill-region-ads.mjs
      - name: Feed health (dead-source report)
        working-directory: aggregator
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node feed-health.mjs
      - name: Regenerate SEO event pages
        working-directory: aggregator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node generate-events.mjs
      - name: Regenerate advertise page (live per-town pricing)
        working-directory: aggregator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node generate-advertise.mjs
      - name: Content guard — flag any ghost/thin town (does not block deploy)
        working-directory: aggregator
        # Non-blocking: the app picker + SEO pages already hide empty towns, and the
        # daily run fills them in. This step just surfaces a red X in the log if a
        # NEW town aggregated to 0 events (likely a mis-wired feed worth a look).
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node check-content.mjs --strict --allow=larue,prospect,green-camp
      - name: Deploy site to Netlify (localloop.io)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        # Use the CLI --prod deploy, which explicitly PUBLISHES. The old raw zip POST to
        # /sites/{id}/deploys uploaded the files but left the deploy "ready" yet
        # UNPUBLISHED (2026-07-10: an 8.3k-file deploy sat unpublished, so localloop.io
        # kept serving the previous deploy and the SEO/portal/widget pages 404'd).
        # --no-build is REQUIRED: without it the CLI runs the Netlify site UI's stale
        # build command ("expo export -p web", a leftover from the old web-app era),
        # which has no expo on this runner and fails the whole deploy (first hit
        # 2026-07-10 late run). site/ is already fully built by the steps above.
        run: npx --yes netlify-cli deploy --prod --no-build --dir=site --site "$NETLIFY_SITE_ID" --message "aggregate ${{ github.run_id }}"
