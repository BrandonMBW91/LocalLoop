name: Weekend digest push

# Friday mornings: push "This weekend near you" to every opted-in device,
# per town. The edge function skips towns with no weekend events.
on:
  schedule:
    - cron: '0 13 * * 5' # Fridays 13:00 UTC = 9am ET (8am in winter)
  workflow_dispatch: {} # manual fire from the Actions tab

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Fire weekend-digest edge function
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sf -X POST \
            "https://wtaefyspddadcrnovumk.supabase.co/functions/v1/weekend-digest" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            | tee result.json
          grep -q '"sent"' result.json
